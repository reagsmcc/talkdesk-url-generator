<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talkdesk SE Doc Linker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --td-purple: #4a154b;
            --td-purple-dark: #2d0a31;
            --td-bg: #f8f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--td-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, var(--td-purple-dark) 0%, var(--td-purple) 100%);
            color: white;
            padding: 40px 0;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1100px;
            margin: -30px auto 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 24px rgba(74, 21, 75, 0.06);
            border: 1px solid #eee;
        }

        h2 { color: var(--td-purple); font-size: 14px; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }

        textarea {
            width: 100%;
            height: 180px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }

        .btn {
            background: var(--td-purple);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        /* THE CRITICAL FIX IS HERE */
        .output-box {
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 25px;
            min-height: 280px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap; /* Keeps your manual line breaks */
            overflow-wrap: anywhere; /* Prevents URLs from breaking bullets to new lines */
            position: relative;
            text-align: left; 
            color: #1d1d1f;
            line-height: 1.6;
            font-size: 13px;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Talkdesk Docs Engine</h1>
    <p style="margin-top: 5px; opacity: 0.8;">Solutions Engineering Tool</p>
</header>

<div class="container">
    <div class="card">
        <h2>Identify Capabilities</h2>
        <textarea id="userInput" placeholder="Paste question here..."></textarea>
        <button class="btn" onclick="processQuery()">Generate Response</button>
    </div>

    <div class="card">
        <h2>Output</h2>
        <div class="output-box">
            <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy</button>
            <div id="outputText">Links will appear here...</div>
        </div>
    </div>
</div>

<script>
    const docMap = [
        { keys: ['knowledge', 'km', 'content creation'], url: 'https://support.talkdesk.com/hc/en-us/articles/360039260152-Talkdesk-Knowledge-Management' },
        { keys: ['recommendation', 'agent assist', 'copilot', 'workflow'], url: 'https://support.talkdesk.com/hc/en-us/sections/360007842611-Talkdesk-Agent-Assist' },
        { keys: ['analytics', 'interaction analytics', 'sentiment', 'consistency'], url: 'https://support.talkdesk.com/hc/en-us/sections/360012996111-Talkdesk-Interaction-Analytics' },
        { keys: ['integration', 'salesforce', 'crm'], url: 'https://support.talkdesk.com/hc/en-us/sections/204273526-Integrations' },
        { keys: ['studio', 'ivr', 'flow'], url: 'https://studio.talkdesk.com/' },
        { keys: ['explore', 'reporting'], url: 'https://support.talkdesk.com/hc/en-us/sections/360004088371-Talkdesk-Explore' }
    ];

    function processQuery() {
        const input = document.getElementById('userInput').value.toLowerCase();
        let matched = new Set();

        docMap.forEach(item => {
            item.keys.forEach(k => {
                if (input.includes(k)) matched.add(item.url);
            });
        });

        const results = Array.from(matched);
        let finalOutput = "For more information please review our documentation:\n\n";
        
        if (results.length > 0) {
            results.forEach((url, index) => {
                if (index === 0) {
                    finalOutput += url + "\n";
                } else {
                    // We add the bullet and then the URL
                    finalOutput += "• " + url + "\n";
                }
            });
        } else {
            finalOutput += "https://support.talkdesk.com/hc/en-us";
        }

        document.getElementById('outputText').innerText = finalOutput;
    }

    function copyText() {
        const text = document.getElementById('outputText').innerText;
        navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        btn.innerText = "Copied!";
        setTimeout(() => { btn.innerText = "Copy"; }, 2000);
    }
</script>
</body>
</html>
